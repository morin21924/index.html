<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --accent: #f06414; --bg: #05070a; --card: #151921; --pos: #00ff9d; --neg: #ff3e3e; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; padding: 5px; margin: 0; text-align: center; -webkit-user-select: none; }
        .tabs { display: flex; gap: 2px; position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 5px 0; }
        .tab-btn { flex: 1; padding: 10px 0; background: var(--card); border: 1px solid #2d3748; color: #718096; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: #fff; }
        .role-section { display: none; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 5px 0; }
        .role-section.active { display: grid; }
        
        /* 画像付きボタンのデザイン */
        .btn { background: #1a202c; border: 1px solid #2d3748; border-radius: 4px; padding: 4px 1px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .btn img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; margin-bottom: 2px; background: #333; }
        .btn span { font-size: 8px; line-height: 1; color: #e0e6ed; }
        .btn.active { background: var(--accent); border-color: #fff; box-shadow: 0 0 10px rgba(240,100,20,0.5); }

        #res-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .res-box { background: var(--card); padding: 8px; border-radius: 8px; border-top: 3px solid; min-height: 120px; text-align: left; }
        .res-title { font-size: 9px; font-weight: bold; margin-bottom: 5px; }
        .row { display: flex; align-items: center; padding: 4px 0; border-bottom: 1px solid #2d3748; font-size: 10px; }
        .row img { width: 18px; height: 18px; border-radius: 50%; margin-right: 5px; background: #333; }
        .tag { margin-left: auto; font-weight: bold; font-size: 9px; }
        .reset { width: 100%; margin-top: 10px; padding: 12px; background: #2d3748; color: #fff; border: none; border-radius: 6px; font-weight: bold; }
    </style>

<meta name="apple-mobile-web-app-capable" content="yes">

</head>
<body>
    <div class="tabs">
        <div class="tab-btn active" onclick="tab('T')">TANK</div>
        <div class="tab-btn" onclick="tab('D')">DPS</div>
        <div class="tab-btn" onclick="tab('S')">SUP</div>
    </div>

    <div id="T" class="role-section active"></div>
    <div id="D" class="role-section"></div>
    <div id="S" class="role-section"></div>

    <div id="res-container">
        <div class="res-box" style="border-color: var(--pos);">
            <div class="res-title" style="color: var(--pos);">BEST PICKS</div>
            <div id="pos-list"></div>
        </div>
        <div class="res-box" style="border-color: var(--neg);">
            <div class="res-title" style="color: var(--neg);">AVOID</div>
            <div id="neg-list"></div>
        </div>
    </div>

    <button class="reset" onclick="location.reload()">RESET SYSTEM</button>

let sel = [];

function getImgUrl(id) {
    if(id.length > 20) return baseImg + id;
    return "https://via.placeholder.com/50/222/fff?text=" + id.substring(0,2);
}

function tab(r) {
    document.querySelectorAll('.role-section, .tab-btn').forEach(e => e.classList.remove('active'));
    document.getElementById(r).classList.add('active');
    event.currentTarget.classList.add('active');
}

function init() {
    for (let name in heroDB) {
        let btn = document.createElement('div');
        btn.className = 'btn';
        btn.innerHTML = `<img src="${getImgUrl(heroDB[name].i)}" onerror="this.style.display='none'"><span>${name}</span>`;
        btn.onclick = function() {
            this.classList.toggle('active');
            let i = sel.indexOf(name);
            if (i > -1) sel.splice(i, 1); else sel.push(name);
            update();
        };
        document.getElementById(heroDB[name].r).appendChild(btn);
    }
}

function update() {
    let pos = {}, neg = {};
    sel.forEach(en => {
        if(heroDB[en]) {
            heroDB[en].c.forEach(ally => pos[ally] = (pos[ally] || 0) + 1);
        }
        for (let hName in heroDB) {
            if (heroDB[hName].c.includes(en)) neg[hName] = (neg[hName] || 0) + 1;
        }
    });

    const draw = (id, data, color) => {
        const el = document.getElementById(id);
        if (sel.length === 0) { el.innerHTML = ""; return; }
        let sorted = Object.entries(data).sort((a,b) => b[1]-a[1]);
        el.innerHTML = sorted.map(x => `
            <div class="row">
                <img src="${heroDB[x[0]] ? getImgUrl(heroDB[x[0]].i) : ''}" onerror="this.style.display='none'">
                <span>${x[0]}</span>
                <span class="tag" style="color:${color}">+${x[1]}</span>
            </div>
        `).join("");
    };

    draw('pos-list', pos, 'var(--pos)');
    draw('neg-list', neg, 'var(--neg)');
}
init();
